<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cassandra Douglas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0C0B14;
      --surface: #13121F;
      --border:  rgba(255,255,255,0.08);
      --text:    #EAE8F4;
      --muted:   rgba(234,232,244,0.8);
      --subtle:  rgba(234,232,244,0.65);
      --violet:  #5B3DF5;
      --violet-light: #C4B4FF;
      --coral:   #FF5C35;
      --error:   #FF6B6B;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      cursor: none;
    }

    /* ── CUSTOM CURSOR ── */
    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--violet-light);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: background 0.2s;
    }

    /* ── BACKGROUND GRID ── */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
    }

    /* Radial vignette over the grid */
    .bg-grid::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 30%, var(--bg) 100%);
    }

    /* ── FLOATING ACCENTS ── */
    .accent {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      opacity: 0.12;
      animation: float 8s ease-in-out infinite;
    }

    .accent--1 {
      width: 400px; height: 400px;
      background: var(--violet);
      top: -100px; right: -100px;
      animation-delay: 0s;
    }

    .accent--2 {
      width: 300px; height: 300px;
      background: var(--coral);
      bottom: -80px; left: -80px;
      animation-delay: -4s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(20px, -20px); }
    }

    /* ── MAIN LAYOUT ── */
    .gate {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 0;
    }

    /* ── MONOGRAM ── */
    .gate__monogram {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--violet-light);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    /* ── HEADING ── */
    .gate__heading {
      font-size: clamp(56px, 10vw, 96px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
      margin-bottom: 20px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.35s;
    }

    .gate__heading em {
      font-style: italic;
      color: var(--violet-light);
    }

    /* ── SUBTEXT ── */
    .gate__sub {
      font-size: 16px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      max-width: 340px;
      margin-bottom: 56px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.5s;
    }

    /* ── INPUT AREA ── */
    .gate__input-wrap {
      display: flex;
      align-items: center;
      gap: 0;
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.65s;
    }

    .gate__input-wrap:focus-within {
      border-color: rgba(91, 61, 245, 0.5);
      box-shadow: 0 0 0 3px rgba(91, 61, 245, 0.12);
    }

    .gate__input-wrap.error {
      border-color: rgba(255, 107, 107, 0.5);
      box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
      animation: shake 0.4s ease, fadeUp 0.6s ease forwards 0.65s;
    }

    .gate__prompt {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      color: var(--violet-light);
      padding: 16px 0 16px 20px;
      flex-shrink: 0;
      user-select: none;
    }

    .gate__input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      color: var(--text);
      padding: 16px 12px;
      letter-spacing: 0.06em;
      caret-color: var(--violet-light);
    }

    .gate__input::placeholder {
      color: var(--subtle);
      letter-spacing: 0.04em;
    }

    .gate__submit {
      background: transparent;
      border: none;
      border-left: 1px solid var(--border);
      padding: 12px 18px;
      cursor: none;
      color: var(--muted);
      font-size: 18px;
      transition: color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .gate__submit:hover {
      color: var(--violet-light);
      background: rgba(91, 61, 245, 0.08);
    }

    /* ── ERROR MESSAGE ── */
    .gate__error {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      letter-spacing: 0.06em;
      color: var(--error);
      margin-top: 16px;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s, transform 0.2s;
      text-align: center;
    }

    .gate__error.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── HINT ── */
    .gate__hint {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-top: 32px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.8s;
    }

    /* ── SUCCESS OVERLAY ── */
    .gate__success {
      position: fixed;
      inset: 0;
      background: #F8F7F4;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .gate__success.visible {
      opacity: 1;
      pointer-events: all;
    }

    .gate__success-text {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      letter-spacing: 0.12em;
      color: #5B3DF5;
      text-transform: uppercase;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }

    /* ── PAGE TRANSITION OUT ── */
    body.exiting {
      animation: fadeOut 0.4s ease forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; }
    }

    @media (max-width: 480px) {
      .gate__input-wrap { max-width: 100%; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="bg-grid"></div>
  <div class="accent accent--1"></div>
  <div class="accent accent--2"></div>

  <main class="gate">
    <p class="gate__monogram">CD</p>

    <h1 class="gate__heading">
      Hello,<br><em>stranger.</em>
    </h1>

    <p class="gate__sub">
      This portfolio is in private preview.<br>
      Enter the passphrase to continue.
    </p>

    <div class="gate__input-wrap" id="inputWrap">
      <span class="gate__prompt">&gt;&nbsp;</span>
      <input
        class="gate__input"
        id="passwordInput"
        type="password"
        placeholder="passphrase..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Enter passphrase"
      >
      <button class="gate__submit" id="submitBtn" aria-label="Submit">→</button>
    </div>

    <p class="gate__error" id="errorMsg">// incorrect passphrase. try again.</p>

    <p class="gate__hint">press enter to continue</p>
  </main>

  <div class="gate__success" id="successOverlay">
    <p class="gate__success-text">// access granted</p>
  </div>

  <script>
    // Password stored as base64 — not cryptographically secure,
    // sufficient for a portfolio soft-gate.
    // To change: replace HASH with btoa('yourNewPassword')
    const HASH = btoa('Whitespace4ever');

    const input      = document.getElementById('passwordInput');
    const inputWrap  = document.getElementById('inputWrap');
    const errorMsg   = document.getElementById('errorMsg');
    const submitBtn  = document.getElementById('submitBtn');
    const success    = document.getElementById('successOverlay');
    const cursor     = document.getElementById('cursor');

    // Auto-focus input
    input.focus();

    // Custom cursor
    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    }, { passive: true });

    function attempt() {
      const val = input.value.trim();
      if (!val) return;

      if (btoa(val) === HASH) {
        // Correct — store auth and transition to site
        sessionStorage.setItem('cd_auth', '1');
        success.classList.add('visible');
        setTimeout(() => {
          window.location.replace('index.html');
        }, 800);
      } else {
        // Wrong — shake + error
        input.value = '';
        errorMsg.classList.remove('visible');
        inputWrap.classList.remove('error');

        // Force reflow to re-trigger animation
        void inputWrap.offsetWidth;

        inputWrap.classList.add('error');
        errorMsg.classList.add('visible');

        setTimeout(() => inputWrap.classList.remove('error'), 500);
        input.focus();
      }
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') attempt();
      // Hide error on any new keystroke
      if (errorMsg.classList.contains('visible')) {
        errorMsg.classList.remove('visible');
      }
    });

    submitBtn.addEventListener('click', attempt);
  </script>

</body>
</html>
